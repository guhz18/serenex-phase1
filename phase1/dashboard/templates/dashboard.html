<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SereneX Dashboard — Cyber Human Monitor</title>
<style>
  :root {
    --bg: #0a0e17;
    --card: #111827;
    --border: #1f2937;
    --text: #e5e7eb;
    --muted: #6b7280;
    --accent: #6366f1;
    --accent2: #22d3ee;
    --green: #10b981;
    --yellow: #f59e0b;
    --red: #ef4444;
    --ch1: #FF6B6B;
    --ch2: #4ECDC4;
    --ch3: #45B7D1;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', 'PingFang SC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── Header ── */
  header {
    background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 100%);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  header .logo { font-size: 20px; font-weight: 700; color: #fff; }
  header .logo span { color: var(--accent); }
  .header-right { display: flex; gap: 16px; align-items: center; }
  .badge { background: var(--accent); color: #fff; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .round-counter { font-size: 13px; color: var(--muted); }
  .round-counter strong { color: var(--accent2); font-size: 16px; }

  /* ── Main Grid ── */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 300px;
    grid-template-rows: auto;
    gap: 16px;
    padding: 16px 24px;
    max-width: 1600px;
    margin: 0 auto;
  }

  /* ── Cards ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .card-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    font-size: 13px; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .card-header .card-icon { margin-right: 6px; }
  .card-body { padding: 16px; }

  /* ── CH Cards ── */
  .ch-grid {
    grid-column: 1 / 3;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }
  .ch-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.3s;
  }
  .ch-card.active-chat { border-color: var(--accent); box-shadow: 0 0 20px rgba(99,102,241,0.15); }
  .ch-card-header { padding: 14px 16px; display: flex; align-items: center; gap: 10px; }
  .ch-avatar {
    width: 40px; height: 40px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .ch-info .ch-name { font-weight: 700; font-size: 15px; }
  .ch-info .ch-mbti { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .ch-state-badge {
    margin-left: auto;
    padding: 4px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 600;
    background: rgba(99,102,241,0.15); color: var(--accent);
  }
  .ch-state-badge.chatting { background: rgba(16,185,129,0.15); color: var(--green); }
  .ch-state-badge.sleeping { background: rgba(245,158,11,0.15); color: var(--yellow); }

  .ch-card-body { padding: 12px 16px; }
  .ch-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .stat-box {
    background: rgba(255,255,255,0.03); border-radius: 8px;
    padding: 8px 10px; text-align: center;
  }
  .stat-box .stat-val { font-size: 18px; font-weight: 700; }
  .stat-box .stat-label { font-size: 10px; color: var(--muted); margin-top: 2px; }

  /* Emotion bar */
  .emotion-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 12px; }
  .emotion-label { width: 60px; color: var(--muted); font-size: 11px; }
  .emotion-bar-wrap { flex: 1; height: 6px; background: rgba(255,255,255,0.08); border-radius: 3px; }
  .emotion-bar { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
  .emotion-val { width: 32px; text-align: right; font-size: 11px; font-weight: 600; }

  /* Brain activation mini chart */
  .brain-chart-wrap { height: 50px; background: rgba(0,0,0,0.2); border-radius: 8px; overflow: hidden; margin-top: 8px; }
  .brain-chart-canvas { width: 100%; height: 100%; }

  /* Relations */
  .relations-list { margin-top: 8px; }
  .rel-item { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; font-size: 12px; }
  .rel-name { width: 40px; color: var(--muted); }
  .rel-bar-wrap { flex: 1; height: 5px; background: rgba(255,255,255,0.07); border-radius: 3px; }
  .rel-bar { height: 100%; border-radius: 3px; transition: width 0.8s ease; }
  .rel-val { width: 32px; text-align: right; font-size: 11px; font-weight: 600; }

  /* ── Relationship Heatmap ── */
  .heatmap-wrap { overflow: auto; }
  .heatmap-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .heatmap-table th, .heatmap-table td {
    padding: 8px; text-align: center; border-radius: 4px;
  }
  .heatmap-table th { color: var(--muted); font-weight: 600; font-size: 11px; }
  .heatmap-cell {
    transition: all 0.3s; cursor: default;
    font-weight: 600; font-size: 11px;
  }

  /* ── Personality Radar ── */
  .radar-wrap { display: flex; justify-content: center; align-items: center; height: 200px; }
  #personalityCanvas { max-width: 220px; max-height: 220px; }

  /* ── Memory Timeline ── */
  .memory-list { max-height: 280px; overflow-y: auto; }
  .memory-item {
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    display: flex; gap: 10px; align-items: flex-start;
  }
  .memory-item:last-child { border-bottom: none; }
  .mem-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
  .mem-content { flex: 1; }
  .mem-text { font-size: 13px; line-height: 1.4; }
  .mem-meta { font-size: 11px; color: var(--muted); margin-top: 3px; display: flex; gap: 8px; }
  .mem-emotion-tag { padding: 1px 6px; border-radius: 10px; font-size: 10px; }

  /* ── Sleep Log ── */
  .sleep-list { max-height: 300px; overflow-y: auto; }
  .sleep-item {
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .sleep-header { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
  .sleep-badge { background: rgba(245,158,11,0.15); color: var(--yellow); padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .sleep-ch { font-size: 13px; font-weight: 600; }
  .sleep-summary { font-size: 12px; color: var(--muted); line-height: 1.4; font-style: italic; }
  .sleep-stats { display: flex; gap: 12px; margin-top: 5px; font-size: 11px; color: var(--muted); }

  /* ── Footer ── */
  .footer { text-align: center; padding: 20px; color: var(--muted); font-size: 12px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Pulse animation for active chat */
  @keyframes glow { 0%,100%{box-shadow:0 0 8px rgba(99,102,241,0.3)} 50%{box-shadow:0 0 20px rgba(99,102,241,0.6)} }
  .ch-card.active-chat { animation: glow 2s ease-in-out infinite; }

  /* Responsive */
  @media (max-width: 900px) {
    .ch-grid { grid-template-columns: 1fr; }
    .main-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- ══ Header ══════════════════════════════════════════════════ -->
<header>
  <div class="logo">🦞 <span>SereneX</span> Phase 1 — Cyber Human Monitor</div>
  <div class="header-right">
    <div class="round-counter">Round <strong id="roundNum">—</strong></div>
    <div class="badge" id="statusBadge">CONNECTING</div>
    <div class="live-dot" id="liveDot" style="display:none"></div>
  </div>
</header>

<!-- ══ Main Grid ═══════════════════════════════════════════════ -->
<div class="main-grid">

  <!-- Row 1-2: CH Cards -->
  <div class="ch-grid" id="chGrid">
    <!-- 动态生成 -->
  </div>

  <!-- Row 1: Relationship Heatmap -->
  <div class="card" style="grid-column:1/2">
    <div class="card-header"><span class="card-icon">🔥</span>关系热力图</div>
    <div class="card-body heatmap-wrap" id="heatmapBody">
      <!-- 动态生成 -->
    </div>
  </div>

  <!-- Row 1: Personality Radar -->
  <div class="card" style="grid-column:2/3">
    <div class="card-header">
      <span class="card-icon">🧠</span>人格雷达
      <select id="personalityCH" onchange="updateRadar()" style="background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:2px 6px;font-size:11px;cursor:pointer">
        <option value="ch_001">小明</option>
        <option value="ch_002">小雨</option>
        <option value="ch_003">阿华</option>
      </select>
    </div>
    <div class="card-body radar-wrap">
      <canvas id="personalityCanvas" width="220" height="220"></canvas>
    </div>
  </div>

  <!-- Row 2: Memory Timeline -->
  <div class="card" style="grid-column:3/4">
    <div class="card-header"><span class="card-icon">💾</span>记忆时间线</div>
    <div class="card-body">
      <div class="memory-list" id="memoryList">
        <div style="text-align:center;color:var(--muted);padding:40px 0;font-size:13px">选择一位 CH 查看记忆</div>
      </div>
    </div>
  </div>

  <!-- Row 3: Sleep Log -->
  <div class="card" style="grid-column:1/3">
    <div class="card-header"><span class="card-icon">🌙</span>睡眠与记忆整合记录</div>
    <div class="card-body">
      <div class="sleep-list" id="sleepList">
        <div style="text-align:center;color:var(--muted);padding:30px 0;font-size:13px">
          每 20 轮自动触发睡眠整合，CH 将重播重要记忆并进行神经强化……
        </div>
      </div>
    </div>
  </div>

</div>

<div class="footer">
  SereneX Phase 1 · Cyber Human Social Simulation · 数据每 2 秒刷新一次
</div>

<script>
// ── Config ──────────────────────────────────────────────────
const CH_COLORS = { "小明": "#FF6B6B", "小雨": "#4ECDC4", "阿华": "#45B7D1" };
const EMOTION_COLORS = {
  "joy":"#FFD93D","sadness":"#6BCB77","anger":"#FF6B6B","fear":"#C490D1",
  "surprise":"#F7B801","disgust":"#A8D8EA","love":"#FF9A8B","anxiety":"#FFB88C",
  "anticipation":"#B5EAD7","neutral":"#AAAAAA","curious":"#B5EAD7"
};
const MBTI_NAMES = {
  "xiaoming":"ENFP热情追梦人","xiaoyu":"INTJ战略家","ahua":"ISFJ温暖守护者"
};
const PERSONALITY_DATA = {
  "ch_001": {mbti:"ENFP", mbti_desc:"热情追梦人", big_five:{openness:0.8,conscientiousness:0.4,extraversion:0.9,agreeableness:0.8,neuroticism:0.3}},
  "ch_002": {mbti:"INTJ", mbti_desc:"独立战略家", big_five:{openness:0.7,conscientiousness:0.9,extraversion:0.2,agreeableness:0.5,neuroticism:0.2}},
  "ch_003": {mbti:"ISFJ", mbti_desc:"温暖守护者", big_five:{openness:0.4,conscientiousness:0.7,extraversion:0.4,agreeableness:0.9,neuroticism:0.3}},
};

// ── Radar Chart ──────────────────────────────────────────────
function drawRadar(chId) {
  const data = PERSONALITY_DATA[chId]; if (!data) return;
  const bf = data.big_five;
  const labels = ["开放性","尽责性","外向性","宜人性","神经质"];
  const values = [bf.openness, bf.conscientiousness, bf.extraversion, bf.agreeableness, bf.neuroticism];
  const color = CH_COLORS[data.mbti_desc.includes("小明")?"小明":data.mbti_desc.includes("小雨")?"小雨":"阿华"];

  const canvas = document.getElementById("personalityCanvas");
  const ctx = canvas.getContext("2d");
  const W = canvas.width, H = canvas.height;
  const cx = W/2, cy = H/2, R = 80;
  ctx.clearRect(0,0,W,H);

  // Grid
  for (let i=1;i<=4;i++) {
    ctx.beginPath();
    for (let j=0;j<=5;j++) {
      const angle = Math.PI*2*(j/5) - Math.PI/2;
      const r = R*i/4;
      const x = cx + r*Math.cos(angle), y = cy + r*Math.sin(angle);
      j===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    }
    ctx.closePath();
    ctx.strokeStyle = "rgba(255,255,255,0.08)";
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Axes
  for (let j=0;j<5;j++) {
    const angle = Math.PI*2*(j/5) - Math.PI/2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + R*Math.cos(angle), cy + R*Math.sin(angle));
    ctx.strokeStyle = "rgba(255,255,255,0.1)";
    ctx.lineWidth = 1;
    ctx.stroke();
    // Label
    const lx = cx + (R+14)*Math.cos(angle), ly = cy + (R+14)*Math.sin(angle);
    ctx.fillStyle = "rgba(255,255,255,0.5)";
    ctx.font = "10px sans-serif";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(labels[j], lx, ly);
  }

  // Data polygon
  ctx.beginPath();
  for (let j=0;j<5;j++) {
    const angle = Math.PI*2*(j/5) - Math.PI/2;
    const r = values[j] * R;
    j===0 ? ctx.moveTo(cx+r*Math.cos(angle), cy+r*Math.sin(angle)) : ctx.lineTo(cx+r*Math.cos(angle), cy+r*Math.sin(angle));
  }
  ctx.closePath();
  ctx.fillStyle = color.replace(")","0.25)").replace("rgb","rgba").replace("#","rgba(");
  ctx.globalAlpha = 0.25;
  ctx.fill();
  ctx.globalAlpha = 1.0;
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.stroke();

  // Dots
  for (let j=0;j<5;j++) {
    const angle = Math.PI*2*(j/5) - Math.PI/2;
    const r = values[j] * R;
    ctx.beginPath();
    ctx.arc(cx+r*Math.cos(angle), cy+r*Math.sin(angle), 3, 0, Math.PI*2);
    ctx.fillStyle = color;
    ctx.fill();
  }

  // Title
  ctx.fillStyle = "#e5e7eb";
  ctx.font = "bold 12px sans-serif";
  ctx.textAlign = "center";
  ctx.fillText(data.mbti, cx, H-8);
  ctx.font = "11px sans-serif";
  ctx.fillStyle = "rgba(255,255,255,0.5)";
  ctx.fillText(data.mbti_desc, cx, H+10);
}

function updateRadar() {
  const chId = document.getElementById("personalityCH").value;
  drawRadar(chId);
}

// ── CH Cards ─────────────────────────────────────────────────
let currentState = null;
let brainHistory = {};  // ch_name -> [vals]

function renderCHCards(data) {
  const grid = document.getElementById("chGrid");
  if (!data.chs) return;
  grid.innerHTML = "";

  data.chs.forEach((ch, idx) => {
    const isActive = ch.state === "in_chat";
    const color = CH_COLORS[ch.name] || "#6366f1";
    const emotionColor = EMOTION_COLORS[ch.emotion] || "#aaa";

    brainHistory[ch.name] = brainHistory[ch.name] || [];
    brainHistory[ch.name].push(parseFloat(ch.brain_activation.toFixed(3)));
    if (brainHistory[ch.name].length > 20) brainHistory[ch.name].shift();

    const card = document.createElement("div");
    card.className = "ch-card" + (isActive ? " active-chat" : "");
    card.style.cssText = `--ch-color:${color}`;

    card.innerHTML = `
      <div class="ch-card-header" style="background:${color}18;border-bottom:1px solid ${color}22">
        <div class="ch-avatar" style="background:${color}33">${ch.state==="in_chat"?"💬":ch.state==="idle"?"😴":"📡"}</div>
        <div class="ch-info">
          <div class="ch-name">${ch.name}</div>
          <div class="ch-mbti">${ch.personality || "ENFP"} · ${ch.emotion}</div>
        </div>
        <div class="ch-state-badge ${isActive?"chatting":""}">${ch.state}</div>
      </div>
      <div class="ch-card-body">
        <div class="ch-stats">
          <div class="stat-box">
            <div class="stat-val" style="color:${ch.brain_activation>0.5?"#f59e0b":"#10b981"}">${ch.brain_activation.toFixed(2)}</div>
            <div class="stat-label">大脑激活</div>
          </div>
          <div class="stat-box">
            <div class="stat-val" style="color:${emotionColor}">${(ch.emotion_val||0.5).toFixed(2)}</div>
            <div class="stat-label">情绪强度</div>
          </div>
        </div>
        <div class="emotion-row">
          <div class="emotion-label">情绪</div>
          <div class="emotion-bar-wrap"><div class="emotion-bar" style="width:${(ch.emotion_val||0.5)*100}%;background:${emotionColor}"></div></div>
          <div class="emotion-val" style="color:${emotionColor}">${ch.emotion}</div>
        </div>
        <div class="brain-chart-wrap">
          <canvas id="brain_${ch.name}" class="brain-chart-canvas" height="50"></canvas>
        </div>
        <div class="relations-list">
          ${(ch.relations||[]).map(r => `
            <div class="rel-item">
              <div class="rel-name">${r.target}</div>
              <div class="rel-bar-wrap"><div class="rel-bar" style="width:${r.prob*100}%;background:${CH_COLORS[r.target]||"#6366f1"}"></div></div>
              <div class="rel-val">${(r.prob*100).toFixed(0)}%</div>
            </div>
          `).join("")}
        </div>
      </div>
    `;
    grid.appendChild(card);
    drawBrainChart(ch.name, brainHistory[ch.name]);
  });

  document.getElementById("roundNum").textContent = data.round || "—";
}

function drawBrainChart(name, history) {
  const canvas = document.getElementById("brain_" + name);
  if (!canvas) return;
  const ctx = canvas.getContext("2d");
  const W = canvas.offsetWidth, H = 50;
  canvas.width = W;
  ctx.clearRect(0,0,W,H);
  if (history.length < 2) return;

  const max = Math.max(...history, 0.1);
  const gradient = ctx.createLinearGradient(0,0,0,H);
  gradient.addColorStop(0, CH_COLORS[name] || "#6366f1");
  gradient.addColorStop(1, "rgba(0,0,0,0)");

  ctx.beginPath();
  history.forEach((v,i) => {
    const x = (i/(history.length-1))*W;
    const y = H - (v/max)*H*0.9;
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  });
  ctx.lineTo(W, H);
  ctx.lineTo(0, H);
  ctx.closePath();
  ctx.fillStyle = gradient;
  ctx.fill();

  ctx.beginPath();
  history.forEach((v,i) => {
    const x = (i/(history.length-1))*W;
    const y = H - (v/max)*H*0.9;
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  });
  ctx.strokeStyle = CH_COLORS[name] || "#6366f1";
  ctx.lineWidth = 1.5;
  ctx.stroke();
}

// ── Heatmap ──────────────────────────────────────────────────
function renderHeatmap(data) {
  const body = document.getElementById("heatmapBody");
  if (!data.chs) return;
  const chs = data.chs;
  const names = chs.map(c=>c.name);

  let html = `<table class="heatmap-table"><thead><tr><th></th>`;
  names.forEach(n => html += `<th>${n}</th>`);
  html += `</tr></thead><tbody>`;

  chs.forEach(row => {
    html += `<tr><th>${row.name}</th>`;
    chs.forEach(col => {
      const rel = (row.relations||[]).find(r=>r.target===col.name);
      const prob = rel ? rel.prob : 0;
      const intensity = Math.floor(prob * 255);
      const r = Math.floor(intensity * 0.9);
      const g = Math.floor(intensity * 0.5);
      const bg = prob > 0 ? `rgb(${r},${g},${Math.floor(r*0.3)})` : "rgba(255,255,255,0.03)";
      const text = prob > 0.5 ? "#fff" : "rgba(255,255,255,0.7)";
      html += `<td class="heatmap-cell" style="background:${bg};color:${text}" title="${row.name} → ${col.name}">${(prob*100).toFixed(0)}%</td>`;
    });
    html += `</tr>`;
  });
  html += `</tbody></table>`;
  body.innerHTML = html;
}

// ── Memory Timeline ───────────────────────────────────────────
async function loadMemory(chName) {
  const list = document.getElementById("memoryList");
  list.innerHTML = `<div style="text-align:center;color:var(--muted);padding:30px 0;font-size:13px">加载中……</div>`;
  try {
    const resp = await fetch(`/api/memories/${chName}`);
    const data = await resp.json();
    if (!data.memories || data.memories.length === 0) {
      list.innerHTML = `<div style="text-align:center;color:var(--muted);padding:30px 0;font-size:13px">暂无记忆</div>`;
      return;
    }
    list.innerHTML = data.memories.map(m => `
      <div class="memory-item">
        <div class="mem-dot" style="background:${EMOTION_COLORS[m.emotion]||"#aaa"}"></div>
        <div class="mem-content">
          <div class="mem-text">"${m.text}"</div>
          <div class="mem-meta">
            <span class="mem-emotion-tag" style="background:${EMOTION_COLORS[m.emotion]}22;color:${EMOTION_COLORS[m.emotion]}">${m.emotion}</span>
            <span>重要度 ${(m.importance*100).toFixed(0)}%</span>
            <span>${m.age}</span>
          </div>
        </div>
      </div>
    `).join("");
  } catch(e) { list.innerHTML = `<div style="color:var(--red);padding:20px 0;font-size:13px">加载失败</div>`; }
}

// Add click handler to CH names to show their memories
document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("chGrid").addEventListener("click", (e) => {
    const nameEl = e.target.closest(".ch-name");
    if (nameEl) loadMemory(nameEl.textContent.trim());
  });
});

// ── Sleep Log ────────────────────────────────────────────────
let sleepLog = [];
function addSleepEvent(event) {
  sleepLog.unshift(event);
  if (sleepLog.length > 20) sleepLog.pop();
  renderSleepLog();
}
function renderSleepLog() {
  const list = document.getElementById("sleepList");
  if (sleepLog.length === 0) return;
  list.innerHTML = sleepLog.map(s => `
    <div class="sleep-item">
      <div class="sleep-header">
        <span class="sleep-badge">🌙 睡眠整合</span>
        <span class="sleep-ch">${s.ch_name}</span>
        <span style="color:var(--muted);font-size:11px;margin-left:auto">重播 ${s.memories_replayed} 段记忆</span>
      </div>
      <div class="sleep-summary">"${s.dream_summary}"</div>
      <div class="sleep-stats">
        <span>🧠 神经强化 +${s.neural_change.toFixed(3)}</span>
        <span>💫 情绪 ${s.emotional_after}</span>
        <span>⏱ ${s.duration_ms.toFixed(0)}ms</span>
      </div>
    </div>
  `).join("");
}

// ── Polling Loop ─────────────────────────────────────────────
let connected = false;
async function poll() {
  try {
    const resp = await fetch("/api/sandbox_info");
    const data = await resp.json();
    connected = data.live !== false;
    document.getElementById("statusBadge").textContent = connected ? "LIVE" : "DEMO";
    document.getElementById("statusBadge").style.background = connected ? "#10b981" : "#6b7280";
    document.getElementById("liveDot").style.display = connected ? "block" : "none";

    document.getElementById("roundNum").textContent = data.round || "—";
    if (data.round && connected) {
      renderCHCards(data);
      renderHeatmap(data);
    }
  } catch(e) {
    document.getElementById("statusBadge").textContent = "OFFLINE";
    document.getElementById("statusBadge").style.background = "#ef4444";
  }
}

// ── Demo Data when not connected ─────────────────────────────
function loadDemoData() {
  const demoData = {
    round: 1,
    chs: [
      {id:"ch_001", name:"小明", state:"idle", emotion:"joy", emotion_val:0.65, brain_activation:0.42, personality:"ENFP", relations:[{target:"小雨",prob:0.55},{target:"阿华",prob:0.38}]},
      {id:"ch_002", name:"小雨", state:"in_chat", emotion:"curious", emotion_val:0.48, brain_activation:0.31, personality:"INTJ", relations:[{target:"小明",prob:0.55},{target:"阿华",prob:0.41}]},
      {id:"ch_003", name:"阿华", state:"idle", emotion:"neutral", emotion_val:0.50, brain_activation:0.38, personality:"ISFJ", relations:[{target:"小明",prob:0.38},{target:"小雨",prob:0.41}]},
    ]
  };
  renderCHCards(demoData);
  renderHeatmap(demoData);
}

// ── Init ─────────────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", () => {
  loadDemoData();
  drawRadar("ch_001");
  poll();
  setInterval(poll, 2000);
});
</script>
